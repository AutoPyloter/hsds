# SonarCloud project metadata
# Replace the organization value below with your actual SonarCloud organization key.
# You can find it in SonarCloud > My Organizations.
sonar.organization=autopyloter
sonar.projectKey=AutoPyloter_harmonix
sonar.projectName=harmonix

# Source layout
sonar.sources=harmonix
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python coverage report generated in GitHub Actions
sonar.python.coverage.reportPaths=coverage.xml

# Keep analysis focused on the package and tests
sonar.exclusions=**/__pycache__/**,benchmarks/**,examples/**,dist_test/**,**/*.egg-info/**
sonar.test.inclusions=tests/**/*.py
