# harmonix ruff configuration
line-length = 120

[lint]
select = ["E", "F", "W", "I"]

ignore = [
    "E501",   # line too long
    "E741",   # ambiguous variable name (l, O, I) — used in math formulas
    "W605",   # invalid escape sequence — in docstrings
]

exclude = [
    ".git",
    "__pycache__",
    "*.egg-info",
    "dist",
    "build",
]

[lint.per-file-ignores]
"harmonix/__init__.py" = ["F401"]
"harmonix/spaces/__init__.py" = ["F401"]
"tests/*" = ["E402", "F811"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"